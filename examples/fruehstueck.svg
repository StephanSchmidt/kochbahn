<text x="167.8" y="144.32" text-anchor="start" font-size="13" fill="#1f2937">Speck in kalte<tspan x="167.8" dy="16.25">Pfanne, mittlere Hitze</tspan></text>
<text x="167.8" y="400.32" text-anchor="start" font-size="13" fill="#1f2937">wenden, knusprig<tspan x="167.8" dy="16.25">braten</tspan></text>
<text x="167.8" y="528.32" text-anchor="start" font-size="13" fill="#1f2937">auf Küchenpapier<tspan x="167.8" dy="16.25">abtropfen</tspan></text>
<text x="377.8" y="400.32" text-anchor="start" font-size="13" fill="#1f2937">Eier verquirlen,<tspan x="377.8" dy="16.25">Butter schmelzen</tspan></text>
<text x="377.8" y="528.32" text-anchor="start" font-size="13" fill="#1f2937">Eier rein, sanft<tspan x="377.8" dy="16.25">rühren (cremig)</tspan></text>
<text x="587.8" y="464.32" text-anchor="start" font-size="13" fill="#1f2937">Brot toasten</text>
<text x="587.8" y="592.32" text-anchor="start" font-size="13" fill="#1f2937">buttern</text>
<text x="444" y="603.15" text-anchor="middle" font-size="11" fill="#6b7280">auf den Teller</text>
<text x="377.8" y="592.32" text-anchor="start" font-size="13" fill="#1f2937">anrichten,<tspan x="377.8" dy="16.25">Speck dazu</tspan></text>
