<text x="377.8" y="322.02" text-anchor="start" font-size="13" fill="#1f2937">Platten schneiden,<tspan x="377.8" dy="16.25">vorkochen</tspan></text>
<text x="587.8" y="130.02" text-anchor="start" font-size="13" fill="#1f2937">Soffritto anschwitzen</text>
<text x="587.8" y="386.02" text-anchor="start" font-size="13" fill="#1f2937">Hackfleisch + Tomaten,<tspan x="587.8" dy="16.25">köcheln lassen</tspan></text>
<text x="797.8" y="258.02" text-anchor="start" font-size="13" fill="#1f2937">Mehlschwitze + Milch</text>
<text x="797.8" y="386.02" text-anchor="start" font-size="13" fill="#1f2937">Muskat, glatt rühren</text>
<text x="377.8" y="514.02" text-anchor="start" font-size="13" fill="#1f2937">schichten</text>
<text x="654" y="524.85" text-anchor="middle" font-size="11" fill="#6b7280">in die Form</text>
