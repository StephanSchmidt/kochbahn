<text x="586.4" y="22" text-anchor="middle" font-size="22" fill="#111827">Lasagne (Test: 5 Spuren, Fork + Merge)</text>
<text x="586.4" y="51.6" text-anchor="middle" font-size="13" fill="#6b7280">Exerziert alle Features: Aufteilen, Zusammenführen, 5 Farben</text>
