<text x="586.4" y="22" text-anchor="middle" font-size="22" fill="#111827">Lasagne (Test: 5 Spuren, Fork + Merge)</text>
<text x="586.4" y="47.7" text-anchor="middle" font-size="13" fill="#6b7280">Exerziert alle Features: Aufteilen, Zusammenführen, 5 Farben</text>
<text x="586.4" y="65.9" text-anchor="middle" font-size="13" fill="#9ca3af">Gesamtzeit: 12 min</text>
<text x="167.8" y="144.32" text-anchor="start" font-size="13" fill="#1f2937">Mehl + Ei verkneten</text>
<text x="167.8" y="272.32" text-anchor="start" font-size="13" fill="#1f2937">Teig ruhen lassen,<tspan x="167.8" dy="16.25">dann ausrollen</tspan></text>
<text x="234" y="299.4" text-anchor="middle" font-size="11" fill="#6b7280">ausrollen</text>
<text x="377.8" y="336.32" text-anchor="start" font-size="13" fill="#1f2937">Platten schneiden,<tspan x="377.8" dy="16.25">vorkochen</tspan></text>
<text x="587.8" y="144.32" text-anchor="start" font-size="13" fill="#1f2937">Soffritto anschwitzen</text>
<text x="587.8" y="400.32" text-anchor="start" font-size="13" fill="#1f2937">Hackfleisch + Tomaten,<tspan x="587.8" dy="16.25">köcheln lassen</tspan></text>
<text x="797.8" y="272.32" text-anchor="start" font-size="13" fill="#1f2937">Mehlschwitze + Milch</text>
<text x="797.8" y="400.32" text-anchor="start" font-size="13" fill="#1f2937">Muskat, glatt rühren</text>
<text x="377.8" y="528.32" text-anchor="start" font-size="13" fill="#1f2937">schichten</text>
<text x="654" y="539.15" text-anchor="middle" font-size="11" fill="#6b7280">in die Form</text>
<text x="587.8" y="528.32" text-anchor="start" font-size="13" fill="#1f2937">Schicht Ragù</text>
<text x="759" y="539.15" text-anchor="middle" font-size="11" fill="#6b7280">schichten</text>
