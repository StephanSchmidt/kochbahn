<text x="339" y="101.32" text-anchor="middle" font-size="13" fill="#ffffff">Wasser / Nudeln</text>
<rect x="456" y="83.9" width="186" height="26" rx="6" fill="#f6850c"/>
<text x="549" y="101.32" text-anchor="middle" font-size="13" fill="#ffffff">Soße</text>
<text x="423.2" y="22" text-anchor="middle" font-size="22" fill="#111827">Salbeibutter-Pasta</text>
<text x="423.2" y="47.7" text-anchor="middle" font-size="13" fill="#6b7280">2 Portionen · burro e salvia</text>
<text x="423.2" y="65.9" text-anchor="middle" font-size="13" fill="#9ca3af">Gesamtzeit: 8 min</text>
<text x="167.8" y="144.32" text-anchor="start" font-size="13" fill="#1f2937">40 g Parmesan reiben</text>
<text x="167.8" y="208.32" text-anchor="start" font-size="13" fill="#1f2937">Salbei waschen +<tspan x="167.8" dy="16.25">trocken tupfen</tspan><tspan x="167.8" dy="16.25">(½ ganz, ½ fein hacken)</tspan></text>
<text x="167.8" y="272.32" text-anchor="start" font-size="13" fill="#1f2937">60 g Butter abwiegen,<tspan x="167.8" dy="16.25">Pfanne bereitstellen</tspan></text>
<text x="377.8" y="144.32" text-anchor="start" font-size="13" fill="#1f2937">Wasser kocht →<tspan x="377.8" dy="16.25">salzen, Nudeln rein</tspan></text>
<text x="377.8" y="528.32" text-anchor="start" font-size="13" fill="#1f2937">2 EL Nudelwasser<tspan x="377.8" dy="16.25">abschöpfen</tspan></text>
<text x="444" y="555.4" text-anchor="middle" font-size="11" fill="#6b7280">→ macht die Soße cremig</text>
<text x="377.8" y="592.32" text-anchor="start" font-size="13" fill="#1f2937">Nudeln abgießen</text>
<text x="444" y="603.15" text-anchor="middle" font-size="11" fill="#6b7280">Nudeln in die Pfanne</text>
<text x="587.8" y="400.32" text-anchor="start" font-size="13" fill="#1f2937">Butter + ganze<tspan x="587.8" dy="16.25">Salbeiblätter in die Pfanne</tspan></text>
<text x="587.8" y="464.32" text-anchor="start" font-size="13" fill="#1f2937">Salbei knusprig,<tspan x="587.8" dy="16.25">Butter nussig-braun →</tspan><tspan x="587.8" dy="16.25">Blätter raus (Topping)</tspan></text>
<text x="587.8" y="528.32" text-anchor="start" font-size="13" fill="#1f2937">fein gehackten Salbei rein,<tspan x="587.8" dy="16.25">mit Nudelwasser cremig</tspan><tspan x="587.8" dy="16.25">rühren → vom Herd</tspan></text>
<text x="587.8" y="592.32" text-anchor="start" font-size="13" fill="#1f2937">Nudeln schwenken,<tspan x="587.8" dy="16.25">Parmesan unterrühren</tspan><tspan x="587.8" dy="16.25">(Hitze aus)</tspan></text>
